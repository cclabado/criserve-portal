[program:criserve-default]
process_name=%(program_name)s_%(process_num)02d
command=php /var/www/criserve-portal/artisan queue:work redis --queue=default,notifications,mail --sleep=1 --tries=3 --timeout=180 --max-time=3600
directory=/var/www/criserve-portal
autostart=true
autorestart=true
stopasgroup=true
killasgroup=true
user=www-data
numprocs=4
redirect_stderr=true
stdout_logfile=/var/log/supervisor/criserve-default.log
stopwaitsecs=3600

